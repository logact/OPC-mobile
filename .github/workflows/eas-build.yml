name: EAS Build

# GitHub Flow 下的 EAS Build 入口：
# - 手动选择 platform 和 profile
# - 调用 EAS 云端构建 Android / iOS
on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios
      profile:
        description: 'EAS profile'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - preview
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.platform }}-${{ github.event.inputs.profile }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.platform }} / ${{ github.event.inputs.profile }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 20
          pnpm-version: 9.15.0

      - name: Build with EAS
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          pnpm exec eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive
