name: Changeset Check

# PR 到 main 时必须包含新增的 .changeset/*.md（文档/CI 类 PR 可加
# no-changeset label 豁免）。与 changesets-bot 的提示互为兜底。
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Changeset present
    if: "!contains(github.event.pull_request.labels.*.name, 'no-changeset')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Check for a new changeset
        run: |
          git fetch origin main --quiet
          ADDED=$(git diff --name-only --diff-filter=AM "FETCH_HEAD...HEAD" -- '.changeset/*.md' | grep -v 'README.md' || true)
          if [[ -z "$ADDED" ]]; then
            echo "::error::This PR has no changeset. Run 'pnpm changeset' and commit the generated file, or add the 'no-changeset' label if this change is not user-facing."
            exit 1
          fi
          echo "Changeset(s) found:"
          echo "$ADDED"
