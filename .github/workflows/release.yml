name: Release

# GitHub Flow 下的发布流程：
# 1. 手动触发 workflow
# 2. 在 main 上执行 pnpm changeset version，消费累积的 changesets
# 3. 提交版本变更并推送回 main
# 4. 打 tag vX.Y.Z 并推送
# 5. 创建 GitHub Release
# 6. tag push 自动触发 CI，构建 Android / iOS 原生产物
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 20
          pnpm-version: 9.15.0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute version from changesets
        run: |
          pnpm changeset version
          VERSION=$(node -p "require('./apps/mobile/package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "Unexpected prerelease version: ${VERSION}" >&2
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Commit version bump and push to main
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='${VERSION}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\\n');"
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 1
          fi
          git commit -m "chore: release ${VERSION}"
          git push origin HEAD:main

      - name: Create and push tag
        run: |
          git tag -a "v${VERSION}" -m "${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        run: gh release create "v${VERSION}" --generate-notes --latest --target main
