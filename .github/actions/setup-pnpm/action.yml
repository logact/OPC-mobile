name: Setup pnpm + Node
description: >
  Installs pnpm, sets up Node, checks out the companion OPC-server repo,
  builds its shared packages, and installs OPC-mobile dependencies.

inputs:
  node-version:
    required: true
    description: Node.js major version (e.g. 22)
  pnpm-version:
    required: true
    description: pnpm version (e.g. 9.15.0)

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Checkout OPC-server
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        repository: logact/OPC-server
        path: OPC-server
        ref: main

    - name: Switch to matching OPC-server branch if present
      shell: bash
      working-directory: OPC-server
      run: |
        REF="${{ github.head_ref || github.ref_name }}"
        if [[ -z "$REF" || "$REF" == "main" ]]; then
          echo "Using main"
          exit 0
        fi
        git fetch origin "$REF" || true
        if git rev-parse --verify "origin/$REF" >/dev/null 2>&1; then
          git checkout -B "$REF" "origin/$REF"
          echo "Switched to $REF"
        else
          echo "Branch $REF not found in OPC-server, staying on main"
        fi

    - name: Build OPC-server shared packages
      shell: bash
      working-directory: OPC-server
      run: |
        pnpm install --frozen-lockfile
        pnpm -F '@opc/core' build
        pnpm -F '@opc/protocol' build

    - name: Link OPC-server into expected location
      shell: bash
      run: ln -s "$(pwd)/OPC-server" ../OPC-server

    - name: Setup Node.js
      uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
